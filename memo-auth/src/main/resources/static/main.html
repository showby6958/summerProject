<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메모 프로젝트 - 테스트 허브</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; background-color: #f0f2f5; min-height: 100vh; }
        .container { max-width: 640px; margin: 0 auto; padding: 60px 20px; }
        h1 { color: #333; }
        p.desc { color: #666; margin-bottom: 32px; }
        .card-list { display: flex; flex-direction: column; gap: 16px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .card h2 { margin: 0 0 4px; font-size: 1.1em; }
        .card p { margin: 0; color: #777; font-size: 0.9em; }
        .card a { text-decoration: none; background-color: #007bff; color: white; padding: 10px 18px; border-radius: 4px; font-weight: bold; white-space: nowrap; }
        .card a:hover { background-color: #0056b3; }
        #logout-btn { margin-top: 32px; padding: 10px 18px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #logout-btn:hover { background: #b02a37; }
    </style>
</head>
<body>

<div class="container">
    <h1>메모 프로젝트 테스트 허브</h1>
    <p class="desc">로그인이 완료되었습니다. 아래에서 서비스별 기능을 테스트할 수 있습니다. (같은 브라우저에서 열면 로그인 쿠키가 그대로 공유됩니다)</p>

    <div class="card-list">
        <div class="card">
            <div>
                <h2>업무 (memo-task : 8082)</h2>
                <p>업무 생성 / 조회</p>
            </div>
            <a href="http://localhost:8082/task.html">열기</a>
        </div>
        <div class="card">
            <div>
                <h2>채팅 (memo-chat : 8083)</h2>
                <p>채팅방 생성 / 실시간 메시지</p>
            </div>
            <a href="http://localhost:8083/chat.html">열기</a>
        </div>
        <div class="card">
            <div>
                <h2>알림 (memo-notification : 8084)</h2>
                <p>업무 생성 시 발생하는 알림 실시간 수신</p>
            </div>
            <a href="http://localhost:8084/notification.html">열기</a>
        </div>
    </div>

    <button id="logout-btn" onclick="logout()">로그아웃</button>
</div>

<script>
    async function logout() {
        try {
            await fetch('/api/auth/logout', { method: 'POST' });
        } finally {
            window.location.href = '/login.html';
        }
    }
</script>

</body>
</html>
