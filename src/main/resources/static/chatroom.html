<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        #chat-container { display: none; }
        #messages {
            height: 400px;
            border: 1px solid #ddd;
            padding: 10px;
            overflow-y: scroll;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        .message {
            list-style-type: none;
            margin-bottom: 5px;
            padding: 5px 10px;
            border-radius: 5px;
            max-width: 70%;
            display: flex;
            align-items: flex-end;
        }
        .my-message {
            background-color: #dcf8c6;
            align-self: flex-end;
        }
        .other-message {
            background-color: #f1f0f0;
            align-self: flex-start;
        }
        .message-content {
            display: flex;
            align-items: flex-end;
        }
        .my-message .message-content {
            flex-direction: row-reverse;
        }
        .message-text {
            word-break: break-all;
            padding: 0 5px;
        }
        .unread-count {
            font-size: 0.8em;
            color: #ffc107;
            font-weight: bold;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Chat Room</h2>
    <p>Logged in as: <strong id="user-email" style="color: #007bff;"></strong></p>

    <!-- Room Management -->
    <div id="room-management">
        <h4>1. Create or Join a Room</h4>
        <div class="input-group mb-3">
            <input type="text" class="form-control" id="room-name" placeholder="Enter new room name">
            <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
        </div>
        <div class="mb-3">
            <h5>Available Rooms</h5>
            <ul id="room-list" class="list-group"></ul>
            <button class="btn btn-secondary mt-2" onclick="getRooms()">Refresh List</button>
        </div>
    </div>

    <!-- Chat Container -->
    <div id="chat-container">
        <h3 id="room-title"></h3>
        <div id="messages"></div>
        <div class="input-group">
            <input type="text" class="form-control" id="message" placeholder="Type a message...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
            <button class="btn btn-danger" onclick="disconnect()">Leave Room</button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    let stompClient = null;
    let roomId = null;
    let currentUserId = null; // Store user's ID
    let currentUsername = null; // Store user's email/name

    const roomManagementDiv = document.getElementById('room-management');
    const chatContainerDiv = document.getElementById('chat-container');
    const messagesDiv = document.getElementById('messages');
    const roomListUl = document.getElementById('room-list');
    const roomTitleH3 = document.getElementById('room-title');
    const messageInput = document.getElementById('message');
    const userEmailDiv = document.getElementById('user-email');

    document.addEventListener("DOMContentLoaded", function() {
        initializeApp();
    });

    async function initializeApp() {
        try {
            const response = await fetch('/api/auth/me');
            if (response.ok) {
                const userInfo = await response.json();
                currentUserId = userInfo.id;
                currentUsername = userInfo.email;
                userEmailDiv.textContent = currentUsername;
                getRooms();
            } else {
                alert("로그인이 필요합니다. 로그인 페이지로 이동합니다.");
                window.location.href = '/login.html';
            }
        } catch (error) {
            console.error('Initialization error:', error);
            alert("오류가 발생하여 로그인 페이지로 이동합니다.");
            window.location.href = '/login.html';
        }
    }

    async function getRooms() {
        try {
            const response = await fetch('/api/chat/rooms');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const rooms = await response.json();
            
            roomListUl.innerHTML = '';
            rooms.forEach(room => {
                const li = document.createElement('li');
                li.className = 'list-group-item d-flex justify-content-between align-items-center';
                li.textContent = `Room: ${room.name} (ID: ${room.roomId})`;
                
                const joinButton = document.createElement('button');
                joinButton.className = 'btn btn-sm btn-info';
                joinButton.textContent = 'Join';
                joinButton.onclick = () => joinRoom(room.roomId, room.name);
                
                li.appendChild(joinButton);
                roomListUl.appendChild(li);
            });
        } catch (error) {
            console.error('Error fetching rooms:', error);
            alert('Failed to fetch rooms. Make sure you are logged in.');
        }
    }

    async function createRoom() {
        try {
            const roomName = document.getElementById('room-name').value;
            if (!roomName) {
                alert('Please enter a room name.');
                return;
            }
            const response = await fetch('/api/chat/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: roomName })
            });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            await response.json();
            getRooms();
            document.getElementById('room-name').value = '';
        } catch (error) {
            console.error('Error creating room:', error);
            alert('Failed to create room.');
        }
    }

    function joinRoom(id, name) {
        if (stompClient) {
            disconnect();
        }
        roomId = id;
        roomTitleH3.textContent = `Chatting in: ${name} (ID: ${roomId})`;
        roomManagementDiv.style.display = 'none';
        chatContainerDiv.style.display = 'block';
        messagesDiv.innerHTML = '';
        connect();
    }

    function connect() {
        try {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, frame => {
                console.log('Connected: ' + frame);
                fetchHistory();

                // --- WebSocket 메시지 처리 로직 ---
                stompClient.subscribe(`/topic/chat/rooms/${roomId}`, message => {
                    const chatMessage = JSON.parse(message.body);
                    
                    if (chatMessage.type === 'READ') {
                        updateMessageReadStatus(chatMessage);
                    } else if (chatMessage.type === 'EDIT') {
                        editMessageOnScreen(chatMessage); // 수정 처리 함수 호출
                    } else if (chatMessage.type === 'DELETE') {
                        deleteMessageOnScreen(chatMessage); // 삭제 처리 함수 호출
                    } else {
                        showMessage(chatMessage);
                    }
                });

            }, error => {
                console.error('Connection error: ' + error);
                alert('Connection failed. Check console for details.');
            });
        } catch (error) {
            console.error('Connection setup failed:', error);
        }
    }
    
    async function fetchHistory() {
        try {
            const response = await fetch(`/api/chat/rooms/${roomId}/messages`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const history = await response.json();
            history.forEach(message => showMessage(message));
        } catch (error) {
            console.error('Error fetching chat history:', error);
        }
    }

    function disconnect() {
        if (stompClient !== null) {
            stompClient.disconnect();
        }
        console.log("Disconnected");
        roomId = null;
        chatContainerDiv.style.display = 'none';
        roomManagementDiv.style.display = 'block';
    }

    function sendMessage() {
        const messageContent = messageInput.value;
        if (messageContent && stompClient) {
            const chatMessage = {
                roomId: roomId,
                sender: currentUsername,
                message: messageContent,
                type: 'TALK'
            };
            // 서버의 MessageMapping 경로와 일치해야 합니다.
            stompClient.send(`/app/chat.sendMessage`, {}, JSON.stringify(chatMessage));
            messageInput.value = '';
        }
    }

    function showMessage(message) {
        // TALK 타입 외에 EDIT, DELETE 등 다른 타입의 메시지는 여기서 바로 표시하지 않도록 처리
        if (message.type !== 'TALK' && message.type !== undefined) return;

        const messageElement = document.createElement('li');
        messageElement.setAttribute('data-message-id', message.messageId);

        const messageContentDiv = document.createElement('div');
        messageContentDiv.className = 'message-content';

        const messageTextSpan = document.createElement('span');
        messageTextSpan.className = 'message-text';
        // 초기 메시지 내용 설정
        messageTextSpan.textContent = `${message.senderName}: ${message.message}`;
        
        // 수정됨 표시를 위한 작은 span
        const editedSpan = document.createElement('span');
        editedSpan.className = 'edited-indicator';
        editedSpan.style.fontSize = '0.7em';
        editedSpan.style.color = '#888';
        editedSpan.style.marginLeft = '5px';
        if (message.editedAt) {
            editedSpan.textContent = '(수정됨)';
        }

        const unreadCountSpan = document.createElement('span');
        unreadCountSpan.className = 'unread-count';

        messageContentDiv.appendChild(unreadCountSpan);
        messageContentDiv.appendChild(messageTextSpan);
        messageContentDiv.appendChild(editedSpan); // 수정됨 표시 span 추가

        messageElement.appendChild(messageContentDiv);

        // 내가 보낸 메시지인 경우
        if (message.senderId === currentUserId) {
            messageElement.className = 'message my-message';
            if (message.unreadCount > 0) {
                unreadCountSpan.textContent = message.unreadCount;
            }

            // --- 수정/삭제 버튼 추가 ---
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';

            const editButton = document.createElement('button');
            editButton.className = 'btn btn-sm btn-outline-primary';
            editButton.textContent = '수정';
            editButton.onclick = () => sendEditRequest(message.messageId);

            const deleteButton = document.createElement('button');
            deleteButton.className = 'btn btn-sm btn-outline-danger';
            deleteButton.textContent = '삭제';
            deleteButton.onclick = () => sendDeleteRequest(message.messageId);
            
            actionsDiv.appendChild(editButton);
            actionsDiv.appendChild(deleteButton);
            messageContentDiv.appendChild(actionsDiv); // 버튼 그룹 추가

        } else { // 다른 사람이 보낸 메시지
            messageElement.className = 'message other-message';
            // 내가 아직 안 읽은 메시지라면, 읽음 처리 요청 전송
            if (stompClient && stompClient.connected) {
                 stompClient.send(`/app/chat.readMessage`, {}, JSON.stringify({ 
                    roomId: roomId,
                    messageId: message.messageId
                }));
            }
        }

        messagesDiv.appendChild(messageElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function updateMessageReadStatus(update) {
        const messageElement = document.querySelector(`li[data-message-id='${update.messageId}']`);
        if (messageElement) {
            const unreadCountSpan = messageElement.querySelector('.unread-count');
            if (unreadCountSpan) {
                if (update.unreadCount > 0) {
                    unreadCountSpan.textContent = update.unreadCount;
                } else {
                    unreadCountSpan.textContent = '';
                }
            }
        }
    }

    // --- 메시지 수정/삭제 관련 함수들 ---

    function editMessageOnScreen(message) {
        const messageElement = document.querySelector(`li[data-message-id='${message.messageId}']`);
        if (messageElement) {
            const messageTextSpan = messageElement.querySelector('.message-text');
            const editedSpan = messageElement.querySelector('.edited-indicator');
            if (messageTextSpan) {
                messageTextSpan.textContent = `${message.senderName}: ${message.message}`;
            }
            if (editedSpan) {
                editedSpan.textContent = '(수정됨)';
            }
        }
    }

    function deleteMessageOnScreen(message) {
        const messageElement = document.querySelector(`li[data-message-id='${message.messageId}']`);
        if (messageElement) {
            const messageTextSpan = messageElement.querySelector('.message-text');
            if (messageTextSpan) {
                messageTextSpan.textContent = message.message; // "삭제된 메시지입니다."
                messageTextSpan.style.color = '#aaa';
                messageTextSpan.style.fontStyle = 'italic';
            }
            // 버튼 삭제
            const actionsDiv = messageElement.querySelector('.message-actions');
            if (actionsDiv) {
                actionsDiv.remove();
            }
        }
    }

    async function sendEditRequest(messageId) {
        const newMessage = prompt("새 메시지 내용을 입력하세요:");
        if (newMessage === null || newMessage.trim() === "") return; // 취소 또는 빈 메시지

        try {
            const response = await fetch(`/rooms/${roomId}/messages/${messageId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ newMessage: newMessage })
            });
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
            }
            // 성공 시 별도 처리 없음. WebSocket이 업데이트를 처리할 것임.
        } catch (error) {
            console.error('Error editing message:', error);
            alert(`메시지 수정 실패: ${error.message}`);
        }
    }

    async function sendDeleteRequest(messageId) {
        if (!confirm("정말로 이 메시지를 삭제하시겠습니까?")) return;

        try {
            const response = await fetch(`/rooms/${roomId}/messages/${messageId}`, {
                method: 'DELETE'
            });
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
            }
            // 성공 시 별도 처리 없음. WebSocket이 업데이트를 처리할 것임.
        } catch (error) {
            console.error('Error deleting message:', error);
            alert(`메시지 삭제 실패: ${error.message}`);
        }
    }
    
    messageInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

</script>
</body>
</html>
